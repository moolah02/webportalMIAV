<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Documentation — Revival Technologies MIAV</title>
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui.css">
<style>
  :root{--blue:#1976D2;--dark:#1a1a2e;--light:#f8f9fa;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;}

  /* PASSWORD SCREEN */
  #lock-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:flex;align-items:center;justify-content:center;z-index:9999;}
  .lock-box{background:#fff;border-radius:16px;padding:50px 40px;width:100%;max-width:420px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  .lock-logo{width:70px;height:70px;background:linear-gradient(135deg,#1976D2,#0f3460);border-radius:16px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;}
  .lock-logo svg{width:36px;height:36px;fill:#fff;}
  .lock-box h1{font-size:22px;color:var(--dark);margin-bottom:6px;}
  .lock-box p{font-size:14px;color:#666;margin-bottom:28px;}
  .lock-box input{width:100%;padding:13px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none;transition:border-color .2s;}
  .lock-box input:focus{border-color:var(--blue);}
  .lock-box button{width:100%;margin-top:14px;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;}
  .lock-box button:hover{background:#1565C0;}
  .lock-err{color:#D32F2F;font-size:13px;margin-top:10px;min-height:20px;}

  /* MAIN */
  #main{display:none;}
  .top-bar{background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 100%);color:#fff;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .top-bar-title{font-size:18px;font-weight:700;}
  .top-bar-sub{font-size:13px;opacity:.65;margin-top:2px;}
  .top-bar a{color:rgba(255,255,255,.75);text-decoration:none;font-size:13px;}
  .top-bar a:hover{color:#fff;}
  .swagger-wrap{max-width:1400px;margin:0 auto;padding:24px 16px 60px;}

  /* Override Swagger UI styles for branding */
  .swagger-ui .topbar{display:none!important;}
  .swagger-ui .info{margin:20px 0 10px;}
  .swagger-ui .info .title{color:var(--dark);}
  .swagger-ui .scheme-container{background:#fff;padding:16px 20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:16px;}
  .swagger-ui .opblock-tag{font-size:16px;font-weight:700;color:var(--dark);}
  .swagger-ui .btn.authorize{background:var(--blue);border-color:var(--blue);color:#fff;}
  .swagger-ui .btn.authorize svg{fill:#fff;}
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-logo">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
    </div>
    <h1>API Documentation</h1>
    <p>Revival Technologies MIAV System<br>Enter your access password to continue.</p>
    <input type="password" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Unlock</button>
    <div class="lock-err" id="pw-err"></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="main">
  <div class="top-bar">
    <div>
      <div class="top-bar-title">Revival Technologies MIAV — API Documentation</div>
      <div class="top-bar-sub">Interactive Swagger UI &nbsp;·&nbsp; OpenAPI 3.0 &nbsp;·&nbsp; Laravel Sanctum Bearer Token Auth</div>
    </div>
    <a href="index.html">← Back to Hub</a>
  </div>
  <div class="swagger-wrap">
    <div id="swagger-ui"></div>
  </div>
</div>

<script src="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-bundle.js"></script>
<script src="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-standalone-preset.js"></script>
<script>
const HASH = 'cGFzc3dvcmQxKg==';
function checkPw(){
  const val = document.getElementById('pw-input').value;
  if(btoa(val) === HASH){
    sessionStorage.setItem('rt_docs_auth','1');
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('main').style.display='block';
    initSwagger();
  } else {
    document.getElementById('pw-err').textContent='Incorrect password. Please try again.';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}
if(sessionStorage.getItem('rt_docs_auth')==='1'){
  document.getElementById('lock-screen').style.display='none';
  document.getElementById('main').style.display='block';
}
document.getElementById('pw-input').focus();

function initSwagger(){
  const spec = {
    openapi: '3.0.3',
    info: {
      title: 'Revival Technologies MIAV API',
      version: '1.0.0',
      description: 'REST API for the MIAV (Man In A Van) field service management system. All protected endpoints require a Bearer token obtained from `POST /api/auth/login`.',
      contact: { name: 'Revival Technologies', email: 'support@revivaltechnologies.co.zw' }
    },
    servers: [
      { url: 'http://51.21.252.67', description: 'Production Server' },
      { url: 'http://51.21.252.67:8080', description: 'Development Server' }
    ],
    components: {
      securitySchemes: {
        BearerAuth: { type: 'http', scheme: 'bearer', bearerFormat: 'JWT', description: 'Sanctum API token. Obtain from POST /api/auth/login' }
      },
      schemas: {
        Error: {
          type: 'object',
          properties: {
            success: { type: 'boolean', example: false },
            message: { type: 'string' },
            errors: { type: 'object' }
          }
        },
        Success: {
          type: 'object',
          properties: {
            success: { type: 'boolean', example: true },
            message: { type: 'string' },
            data: { type: 'object' }
          }
        },
        Paginated: {
          type: 'object',
          properties: {
            data: { type: 'array', items: { type: 'object' } },
            current_page: { type: 'integer' },
            last_page: { type: 'integer' },
            per_page: { type: 'integer' },
            total: { type: 'integer' }
          }
        },
        User: {
          type: 'object',
          properties: {
            id: { type: 'integer' },
            name: { type: 'string' },
            email: { type: 'string', format: 'email' },
            role: { type: 'string', enum: ['admin','manager','field_technician','client_user'] },
            is_active: { type: 'boolean' },
            created_at: { type: 'string', format: 'date-time' }
          }
        },
        Ticket: {
          type: 'object',
          properties: {
            id: { type: 'integer' },
            ticket_id: { type: 'string', example: 'TKT-00123' },
            title: { type: 'string' },
            description: { type: 'string' },
            status: { type: 'string', enum: ['open','in_progress','pending','resolved','closed','cancelled'] },
            priority: { type: 'string', enum: ['low','medium','high','critical'] },
            ticket_type: { type: 'string', enum: ['general','pos_terminal','field_service'] },
            assignment_type: { type: 'string', enum: ['direct','public'] },
            assigned_to: { type: 'integer', nullable: true },
            pos_terminal_id: { type: 'integer', nullable: true },
            created_at: { type: 'string', format: 'date-time' }
          }
        },
        Job: {
          type: 'object',
          properties: {
            id: { type: 'integer' },
            assignment_id: { type: 'string' },
            technician_id: { type: 'integer' },
            pos_terminal_id: { type: 'integer' },
            client_id: { type: 'integer' },
            status: { type: 'string', enum: ['pending','assigned','in_progress','completed','cancelled'] },
            scheduled_date: { type: 'string', format: 'date' },
            notes: { type: 'string', nullable: true },
            created_at: { type: 'string', format: 'date-time' }
          }
        },
        PosTerminal: {
          type: 'object',
          properties: {
            id: { type: 'integer' },
            terminal_id: { type: 'string' },
            serial_number: { type: 'string' },
            model: { type: 'string' },
            status: { type: 'string', enum: ['active','inactive','maintenance','decommissioned'] },
            client_id: { type: 'integer' },
            region_id: { type: 'integer' },
            is_active: { type: 'boolean' }
          }
        },
        Asset: {
          type: 'object',
          properties: {
            id: { type: 'integer' },
            name: { type: 'string' },
            asset_code: { type: 'string' },
            category: { type: 'string' },
            status: { type: 'string', enum: ['available','assigned','in_repair','retired'] },
            assigned_to: { type: 'integer', nullable: true }
          }
        },
        Client: {
          type: 'object',
          properties: {
            id: { type: 'integer' },
            company_name: { type: 'string' },
            contact_name: { type: 'string' },
            email: { type: 'string', format: 'email' },
            phone: { type: 'string' },
            region: { type: 'string' },
            is_active: { type: 'boolean' }
          }
        },
        Technician: {
          type: 'object',
          properties: {
            id: { type: 'integer' },
            name: { type: 'string' },
            email: { type: 'string' },
            phone: { type: 'string' },
            region: { type: 'string' },
            availability_status: { type: 'string', enum: ['available','busy','off_duty'] },
            is_active: { type: 'boolean' }
          }
        },
        Visit: {
          type: 'object',
          properties: {
            id: { type: 'integer' },
            assignment_id: { type: 'integer' },
            technician_id: { type: 'integer' },
            visit_date: { type: 'string', format: 'date' },
            notes: { type: 'string' },
            status: { type: 'string' },
            created_at: { type: 'string', format: 'date-time' }
          }
        }
      }
    },
    security: [{ BearerAuth: [] }],
    tags: [
      { name: 'Authentication', description: 'Login, logout, registration, and profile management' },
      { name: 'Jobs & Assignments', description: 'Field job assignments — creation, status updates, lifecycle actions' },
      { name: 'Tickets', description: 'Support tickets — creation, assignment, resolution, and audit trail' },
      { name: 'POS Terminals', description: 'Terminal inventory — CRUD, import/export, statistics, services' },
      { name: 'Assets', description: 'Asset inventory management and assignments' },
      { name: 'Asset Requests', description: 'Requests for asset allocation' },
      { name: 'Clients', description: 'Client records, terminals, projects, and statistics' },
      { name: 'Technicians', description: 'Technician profiles, schedules, performance, and availability' },
      { name: 'Visits', description: 'Site visit records and evidence uploads' },
      { name: 'Dashboard', description: 'Dashboard statistics by role' },
      { name: 'Reports', description: 'Report generation, export, and analytics' },
      { name: 'Sync', description: 'Offline-first mobile sync endpoints' },
      { name: 'Notifications', description: 'In-app notification management' },
      { name: 'Uploads', description: 'File upload endpoints (photos, documents, avatars)' },
      { name: 'Public', description: 'Unauthenticated public endpoints' },
      { name: 'Utils', description: 'Utility endpoints for search and quick stats' },
      { name: 'Webhooks', description: 'Webhook receivers for external system events' }
    ],
    paths: {

      /* ===================== AUTHENTICATION ===================== */
      '/api/auth/login': {
        post: {
          tags: ['Authentication'],
          summary: 'Login',
          security: [],
          requestBody: {
            required: true,
            content: { 'application/json': { schema: { type: 'object', required: ['email','password'], properties: {
              email: { type: 'string', format: 'email', example: 'tech@example.com' },
              password: { type: 'string', minLength: 6, example: 'secret123' }
            }}}}
          },
          responses: {
            200: { description: 'Login successful', content: { 'application/json': { schema: { type: 'object', properties: {
              success: { type: 'boolean', example: true },
              token: { type: 'string', description: 'Sanctum Bearer token' },
              user: { $ref: '#/components/schemas/User' }
            }}}}},
            401: { description: 'Invalid credentials' },
            403: { description: 'Account inactive' },
            422: { description: 'Validation error' }
          }
        }
      },
      '/api/auth/logout': {
        post: {
          tags: ['Authentication'],
          summary: 'Logout — revokes current token',
          responses: { 200: { description: 'Logged out successfully' } }
        }
      },
      '/api/auth/register': {
        post: {
          tags: ['Authentication'],
          summary: 'Register new user (admin only)',
          requestBody: {
            required: true,
            content: { 'application/json': { schema: { type: 'object', required: ['name','email','password','role'], properties: {
              name: { type: 'string' },
              email: { type: 'string', format: 'email' },
              password: { type: 'string', minLength: 8 },
              password_confirmation: { type: 'string' },
              role: { type: 'string', enum: ['admin','manager','field_technician','client_user'] },
              phone: { type: 'string' },
              region: { type: 'string' }
            }}}}
          },
          responses: { 201: { description: 'User created' }, 422: { description: 'Validation error' } }
        }
      },
      '/api/auth/forgot-password': {
        post: {
          tags: ['Authentication'],
          summary: 'Send password reset email',
          security: [],
          requestBody: {
            required: true,
            content: { 'application/json': { schema: { type: 'object', required: ['email'], properties: {
              email: { type: 'string', format: 'email' }
            }}}}
          },
          responses: { 200: { description: 'Reset email sent' }, 422: { description: 'Email not found' } }
        }
      },
      '/api/auth/reset-password': {
        post: {
          tags: ['Authentication'],
          summary: 'Reset password using token',
          security: [],
          requestBody: {
            required: true,
            content: { 'application/json': { schema: { type: 'object', required: ['token','email','password'], properties: {
              token: { type: 'string' },
              email: { type: 'string', format: 'email' },
              password: { type: 'string', minLength: 8 },
              password_confirmation: { type: 'string' }
            }}}}
          },
          responses: { 200: { description: 'Password reset successful' }, 422: { description: 'Invalid token or validation error' } }
        }
      },
      '/api/auth/refresh': {
        post: {
          tags: ['Authentication'],
          summary: 'Refresh — issue new token, revoke old',
          responses: { 200: { description: 'New token issued', content: { 'application/json': { schema: { type: 'object', properties: {
            success: { type: 'boolean' },
            token: { type: 'string' }
          }}}}}}
        }
      },
      '/api/auth/profile': {
        get: {
          tags: ['Authentication'],
          summary: 'Get authenticated user profile',
          responses: { 200: { description: 'Profile data', content: { 'application/json': { schema: { $ref: '#/components/schemas/User' }}}}}
        },
        put: {
          tags: ['Authentication'],
          summary: 'Update profile (name, phone, etc.)',
          requestBody: {
            required: true,
            content: { 'application/json': { schema: { type: 'object', properties: {
              name: { type: 'string' },
              phone: { type: 'string' },
              region: { type: 'string' }
            }}}}
          },
          responses: { 200: { description: 'Profile updated' } }
        }
      },
      '/api/auth/profile/password': {
        patch: {
          tags: ['Authentication'],
          summary: 'Change own password',
          requestBody: {
            required: true,
            content: { 'application/json': { schema: { type: 'object', required: ['current_password','password'], properties: {
              current_password: { type: 'string' },
              password: { type: 'string', minLength: 8 },
              password_confirmation: { type: 'string' }
            }}}}
          },
          responses: { 200: { description: 'Password changed' }, 422: { description: 'Current password incorrect' } }
        }
      },
      '/api/auth/user': {
        get: {
          tags: ['Authentication'],
          summary: 'Get basic user data (alias for profile)',
          responses: { 200: { description: 'User object' } }
        }
      },

      /* ===================== JOBS & ASSIGNMENTS ===================== */
      '/api/jobs': {
        get: {
          tags: ['Jobs & Assignments'],
          summary: 'List all job assignments',
          parameters: [
            { name: 'status', in: 'query', schema: { type: 'string', enum: ['pending','assigned','in_progress','completed','cancelled'] } },
            { name: 'technician_id', in: 'query', schema: { type: 'integer' } },
            { name: 'per_page', in: 'query', schema: { type: 'integer', default: 25 } },
            { name: 'page', in: 'query', schema: { type: 'integer', default: 1 } }
          ],
          responses: { 200: { description: 'Paginated job list', content: { 'application/json': { schema: { $ref: '#/components/schemas/Paginated' }}}}}
        },
        post: {
          tags: ['Jobs & Assignments'],
          summary: 'Create a new job assignment',
          requestBody: {
            required: true,
            content: { 'application/json': { schema: { type: 'object', required: ['technician_id','pos_terminal_id','scheduled_date'], properties: {
              technician_id: { type: 'integer' },
              pos_terminal_id: { type: 'integer' },
              client_id: { type: 'integer' },
              scheduled_date: { type: 'string', format: 'date' },
              notes: { type: 'string' },
              priority: { type: 'string', enum: ['low','medium','high'] }
            }}}}
          },
          responses: { 201: { description: 'Job created', content: { 'application/json': { schema: { $ref: '#/components/schemas/Job' }}}}, 422: { description: 'Validation error' } }
        }
      },
      '/api/jobs/mine': {
        get: {
          tags: ['Jobs & Assignments'],
          summary: "Get authenticated technician's own assignments",
          parameters: [
            { name: 'status', in: 'query', schema: { type: 'string' } },
            { name: 'include_completed', in: 'query', schema: { type: 'boolean', default: false } }
          ],
          responses: { 200: { description: 'List of assignments' } }
        }
      },
      '/api/jobs/my-assignments': {
        get: { tags: ['Jobs & Assignments'], summary: "Alias for GET /api/jobs/mine", responses: { 200: { description: 'List of assignments' } } }
      },
      '/api/jobs/export': {
        get: {
          tags: ['Jobs & Assignments'],
          summary: 'Export jobs as CSV',
          responses: { 200: { description: 'CSV file download', content: { 'text/csv': {} } } }
        }
      },
      '/api/jobs/assignments': {
        get: { tags: ['Jobs & Assignments'], summary: 'List assignments (alias for GET /api/jobs)', responses: { 200: { description: 'Job list' } } }
      },
      '/api/jobs/regions/{region}/terminals': {
        get: {
          tags: ['Jobs & Assignments'],
          summary: 'Get terminals in a region for job assignment',
          parameters: [
            { name: 'region', in: 'path', required: true, schema: { type: 'integer' } },
            { name: 'client_id', in: 'query', schema: { type: 'integer' } }
          ],
          responses: { 200: { description: 'Terminal list for the region' } }
        }
      },
      '/api/jobs/{assignment}': {
        get: {
          tags: ['Jobs & Assignments'],
          summary: 'Get single job assignment',
          parameters: [{ name: 'assignment', in: 'path', required: true, schema: { type: 'integer' } }],
          responses: { 200: { description: 'Job details' }, 404: { description: 'Not found' } }
        },
        put: {
          tags: ['Jobs & Assignments'],
          summary: 'Update job assignment',
          parameters: [{ name: 'assignment', in: 'path', required: true, schema: { type: 'integer' } }],
          requestBody: { required: true, content: { 'application/json': { schema: { type: 'object', properties: {
            scheduled_date: { type: 'string', format: 'date' },
            notes: { type: 'string' },
            priority: { type: 'string' },
            status: { type: 'string' }
          }}}}},
          responses: { 200: { description: 'Updated' }, 403: { description: 'Forbidden' } }
        },
        delete: {
          tags: ['Jobs & Assignments'],
          summary: 'Delete job assignment',
          parameters: [{ name: 'assignment', in: 'path', required: true, schema: { type: 'integer' } }],
          responses: { 200: { description: 'Deleted' }, 403: { description: 'Forbidden' } }
        }
      },
      '/api/jobs/{assignment}/status': {
        patch: {
          tags: ['Jobs & Assignments'],
          summary: 'Update job status',
          parameters: [{ name: 'assignment', in: 'path', required: true, schema: { type: 'integer' } }],
          requestBody: { required: true, content: { 'application/json': { schema: { type: 'object', required: ['status'], properties: {
            status: { type: 'string', enum: ['pending','assigned','in_progress','completed','cancelled'] }
          }}}}},
          responses: { 200: { description: 'Status updated' } }
        }
      },
      '/api/jobs/{assignment}/start': {
        post: {
          tags: ['Jobs & Assignments'], summary: 'Start a job (set in_progress)',
          parameters: [{ name: 'assignment', in: 'path', required: true, schema: { type: 'integer' } }],
          responses: { 200: { description: 'Job started' } }
        }
      },
      '/api/jobs/{assignment}/checkin': {
        post: {
          tags: ['Jobs & Assignments'], summary: 'Check in at job site',
          parameters: [{ name: 'assignment', in: 'path', required: true, schema: { type: 'integer' } }],
          requestBody: { content: { 'application/json': { schema: { type: 'object', properties: {
            latitude: { type: 'number', format: 'float' },
            longitude: { type: 'number', format: 'float' }
          }}}}},
          responses: { 200: { description: 'Checked in' } }
        }
      },
      '/api/jobs/{assignment}/checkout': {
        post: {
          tags: ['Jobs & Assignments'], summary: 'Check out from job site',
          parameters: [{ name: 'assignment', in: 'path', required: true, schema: { type: 'integer' } }],
          responses: { 200: { description: 'Checked out' } }
        }
      },
      '/api/jobs/{assignment}/pause': {
        post: {
          tags: ['Jobs & Assignments'], summary: 'Pause a job',
          parameters: [{ name: 'assignment', in: 'path', required: true, schema: { type: 'integer' } }],
          requestBody: { content: { 'application/json': { schema: { type: 'object', properties: { reason: { type: 'string' } }}}}},
          responses: { 200: { description: 'Job paused' } }
        }
      },
      '/api/jobs/{assignment}/complete': {
        post: {
          tags: ['Jobs & Assignments'], summary: 'Mark job as completed',
          parameters: [{ name: 'assignment', in: 'path', required: true, schema: { type: 'integer' } }],
          requestBody: { content: { 'application/json': { schema: { type: 'object', properties: {
            completion_notes: { type: 'string' },
            outcome: { type: 'string' }
          }}}}},
          responses: { 200: { description: 'Job completed' } }
        }
      },
      '/api/jobs/{assignment}/cancel': {
        post: {
          tags: ['Jobs & Assignments'], summary: 'Cancel a job',
          parameters: [{ name: 'assignment', in: 'path', required: true, schema: { type: 'integer' } }],
          requestBody: { content: { 'application/json': { schema: { type: 'object', properties: { reason: { type: 'string' } }}}}},
          responses: { 200: { description: 'Job cancelled' } }
        }
      },
      '/api/jobs/{assignment}/location': {
        post: {
          tags: ['Jobs & Assignments'], summary: "Update technician's GPS location for this job",
